appId: com.miniksp.game
productName: miniKSP
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: miniKSP-${version}-portable.exe
